services:
  - type: web
    name: vibelang-compiler
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.1
      - key: FLASK_ENV
        value: production
      - key: AI_GATEWAY_BASE_URL
        value: https://ai-gateway.vercel.sh/v1
      - key: AI_MODEL
        value: openai/gpt-4.1-nano
